version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: nutrition-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - nutrition-net

  # Service de développement avec hot-reload
  app-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: nutrition-api-dev
    profiles:
      - dev
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug
      LOG_FORMAT: pretty
      SWAGGER_ENABLED: "true"
    env_file:
      - .env
    volumes:
      # Monte le code source pour le hot-reload
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    networks:
      - nutrition-net

networks:
  nutrition-net:
    driver: bridge
