  <text x="20" y="238" fill="#cdd6f4" font-size="13">    { </text><text x="44" y="238" fill="#89b4fa" font-size="13">"field"</text><text x="100" y="238" fill="#cdd6f4" font-size="13">: </text><text x="110" y="238" fill="#a6e3a1" font-size="13">"sexe"</text><text x="158" y="238" fill="#cdd6f4" font-size="13">,           </text><text x="236" y="238" fill="#89b4fa" font-size="13">"message"</text><text x="316" y="238" fill="#cdd6f4" font-size="13">: </text><text x="326" y="238" fill="#f38ba8" font-size="13">"Le sexe doit être \"homme\" ou \"femme\""</text><text x="602" y="238" fill="#cdd6f4" font-size="13"> },</text>
