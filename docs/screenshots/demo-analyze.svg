<svg width="820" height="640" viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', 'Cascadia Code', 'Courier New', monospace">
  <!-- Window -->
  <rect width="820" height="640" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="820" height="10" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="410" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="500">nutrition-api — POST /api/v1/nutrition/analyze</text>

  <!-- Prompt line -->
  <text x="20" y="68" fill="#a6e3a1" font-size="13">❯</text>
  <text x="36" y="68" fill="#cdd6f4" font-size="13">curl -s -X POST http://localhost:3000/api/v1/nutrition/analyze \</text>
  <text x="36" y="88" fill="#cdd6f4" font-size="13">  -H </text>
  <text x="68" y="88" fill="#a6e3a1" font-size="13">"Content-Type: application/json"</text>
  <text x="68" y="88" fill="#cdd6f4" font-size="13" dx="232"> \</text>
  <text x="36" y="108" fill="#cdd6f4" font-size="13">  -d </text>
  <text x="68" y="108" fill="#a6e3a1" font-size="13">'{"sexe":"homme","age":30,"taille":175,"poids":80,</text>
  <text x="68" y="128" fill="#a6e3a1" font-size="13">   "niveau_activite":"moderement_actif","objectif":"perte_poids"}'</text>
  <text x="36" y="148" fill="#cdd6f4" font-size="13">  | jq</text>

  <!-- JSON output -->
  <text x="20" y="178" fill="#cdd6f4" font-size="13">{</text>

  <text x="20" y="198" fill="#89b4fa" font-size="13">  "status"</text><text x="107" y="198" fill="#cdd6f4" font-size="13">: </text><text x="117" y="198" fill="#a6e3a1" font-size="13">"success"</text><text x="189" y="198" fill="#cdd6f4" font-size="13">,</text>

  <text x="20" y="218" fill="#89b4fa" font-size="13">  "data"</text><text x="83" y="218" fill="#cdd6f4" font-size="13">: {</text>

  <text x="20" y="238" fill="#6c7086" font-size="13">    // ── Profil ──────────────────────────────────────</text>

  <text x="20" y="258" fill="#89b4fa" font-size="13">    "profil"</text><text x="95" y="258" fill="#cdd6f4" font-size="13">: {</text>
  <text x="20" y="278" fill="#89b4fa" font-size="13">      "imc"</text><text x="79" y="278" fill="#cdd6f4" font-size="13">: { </text><text x="103" y="278" fill="#89b4fa" font-size="13">"valeur"</text><text x="175" y="278" fill="#cdd6f4" font-size="13">: </text><text x="185" y="278" fill="#fab387" font-size="13">26.1</text><text x="213" y="278" fill="#cdd6f4" font-size="13">, </text><text x="223" y="278" fill="#89b4fa" font-size="13">"classification"</text><text x="351" y="278" fill="#cdd6f4" font-size="13">: </text><text x="361" y="278" fill="#a6e3a1" font-size="13">"surpoids"</text><text x="441" y="278" fill="#cdd6f4" font-size="13"> },</text>
  <text x="20" y="298" fill="#89b4fa" font-size="13">      "bmr"</text><text x="79" y="298" fill="#cdd6f4" font-size="13">: { </text><text x="103" y="298" fill="#89b4fa" font-size="13">"valeur"</text><text x="175" y="298" fill="#cdd6f4" font-size="13">: </text><text x="185" y="298" fill="#fab387" font-size="13">1749</text><text x="213" y="298" fill="#cdd6f4" font-size="13">, </text><text x="223" y="298" fill="#89b4fa" font-size="13">"methode"</text><text x="307" y="298" fill="#cdd6f4" font-size="13">: </text><text x="317" y="298" fill="#a6e3a1" font-size="13">"Mifflin-St Jeor"</text><text x="449" y="298" fill="#cdd6f4" font-size="13"> },</text>
  <text x="20" y="318" fill="#89b4fa" font-size="13">      "tdee"</text><text x="87" y="318" fill="#cdd6f4" font-size="13">: { </text><text x="111" y="318" fill="#89b4fa" font-size="13">"valeur"</text><text x="183" y="318" fill="#cdd6f4" font-size="13">: </text><text x="193" y="318" fill="#fab387" font-size="13">2711</text><text x="221" y="318" fill="#cdd6f4" font-size="13">, </text><text x="231" y="318" fill="#89b4fa" font-size="13">"facteur_activite"</text><text x="383" y="318" fill="#cdd6f4" font-size="13">: </text><text x="393" y="318" fill="#fab387" font-size="13">1.55</text><text x="421" y="318" fill="#cdd6f4" font-size="13"> }</text>
  <text x="20" y="338" fill="#cdd6f4" font-size="13">    },</text>

  <text x="20" y="358" fill="#6c7086" font-size="13">    // ── Calories cibles ─────────────────────────────</text>

  <text x="20" y="378" fill="#89b4fa" font-size="13">    "calories_cibles"</text><text x="167" y="378" fill="#cdd6f4" font-size="13">: {</text>
  <text x="20" y="398" fill="#89b4fa" font-size="13">      "valeur"</text><text x="103" y="398" fill="#cdd6f4" font-size="13">: </text><text x="113" y="398" fill="#fab387" font-size="13">2211</text><text x="141" y="398" fill="#cdd6f4" font-size="13">,  </text><text x="165" y="398" fill="#89b4fa" font-size="13">"ajustement"</text><text x="277" y="398" fill="#cdd6f4" font-size="13">: </text><text x="287" y="398" fill="#f38ba8" font-size="13">-500</text><text x="315" y="398" fill="#cdd6f4" font-size="13">,  </text><text x="339" y="398" fill="#6c7086" font-size="13">// ≈ −0.5 kg/semaine</text>
  <text x="20" y="418" fill="#89b4fa" font-size="13">      "objectif"</text><text x="119" y="418" fill="#cdd6f4" font-size="13">: </text><text x="129" y="418" fill="#a6e3a1" font-size="13">"perte de poids sécurisée (≈ 0.5 kg/semaine)"</text>
  <text x="20" y="438" fill="#cdd6f4" font-size="13">    },</text>

  <text x="20" y="458" fill="#6c7086" font-size="13">    // ── Macronutriments ──────────────────────────────</text>

  <text x="20" y="478" fill="#89b4fa" font-size="13">    "macronutriments"</text><text x="167" y="478" fill="#cdd6f4" font-size="13">: {</text>
  <text x="20" y="498" fill="#89b4fa" font-size="13">      "proteines"</text><text x="127" y="498" fill="#cdd6f4" font-size="13">: { </text><text x="151" y="498" fill="#89b4fa" font-size="13">"valeur"</text><text x="223" y="498" fill="#cdd6f4" font-size="13">: </text><text x="233" y="498" fill="#fab387" font-size="13">160</text><text x="257" y="498" fill="#cdd6f4" font-size="13">, </text><text x="267" y="498" fill="#89b4fa" font-size="13">"calories"</text><text x="355" y="498" fill="#cdd6f4" font-size="13">: </text><text x="365" y="498" fill="#fab387" font-size="13">640</text><text x="389" y="498" fill="#cdd6f4" font-size="13">, </text><text x="399" y="498" fill="#89b4fa" font-size="13">"pourcentage"</text><text x="511" y="498" fill="#cdd6f4" font-size="13">: </text><text x="521" y="498" fill="#fab387" font-size="13">29</text><text x="540" y="498" fill="#cdd6f4" font-size="13"> },</text>
  <text x="20" y="518" fill="#89b4fa" font-size="13">      "lipides"</text><text x="103" y="518" fill="#cdd6f4" font-size="13">:   { </text><text x="135" y="518" fill="#89b4fa" font-size="13">"valeur"</text><text x="207" y="518" fill="#cdd6f4" font-size="13">: </text><text x="217" y="518" fill="#fab387" font-size="13">74</text><text x="237" y="518" fill="#cdd6f4" font-size="13">,  </text><text x="259" y="518" fill="#89b4fa" font-size="13">"calories"</text><text x="347" y="518" fill="#cdd6f4" font-size="13">: </text><text x="357" y="518" fill="#fab387" font-size="13">663</text><text x="381" y="518" fill="#cdd6f4" font-size="13">, </text><text x="391" y="518" fill="#89b4fa" font-size="13">"pourcentage"</text><text x="503" y="518" fill="#cdd6f4" font-size="13">: </text><text x="513" y="518" fill="#fab387" font-size="13">30</text><text x="532" y="518" fill="#cdd6f4" font-size="13"> },</text>
  <text x="20" y="538" fill="#89b4fa" font-size="13">      "glucides"</text><text x="111" y="538" fill="#cdd6f4" font-size="13">:  { </text><text x="143" y="538" fill="#89b4fa" font-size="13">"valeur"</text><text x="215" y="538" fill="#cdd6f4" font-size="13">: </text><text x="225" y="538" fill="#fab387" font-size="13">227</text><text x="253" y="538" fill="#cdd6f4" font-size="13">, </text><text x="263" y="538" fill="#89b4fa" font-size="13">"calories"</text><text x="351" y="538" fill="#cdd6f4" font-size="13">: </text><text x="361" y="538" fill="#fab387" font-size="13">908</text><text x="389" y="538" fill="#cdd6f4" font-size="13">, </text><text x="399" y="538" fill="#89b4fa" font-size="13">"pourcentage"</text><text x="511" y="538" fill="#cdd6f4" font-size="13">: </text><text x="521" y="538" fill="#fab387" font-size="13">41</text><text x="540" y="538" fill="#cdd6f4" font-size="13"> }</text>
  <text x="20" y="558" fill="#cdd6f4" font-size="13">    }</text>
  <text x="20" y="578" fill="#cdd6f4" font-size="13">  },</text>
  <text x="20" y="598" fill="#89b4fa" font-size="13">  "disclaimer"</text><text x="115" y="598" fill="#cdd6f4" font-size="13">: </text><text x="125" y="598" fill="#a6e3a1" font-size="13">"Ces recommandations sont à titre informatif..."</text>
  <text x="20" y="618" fill="#cdd6f4" font-size="13">}</text>
</svg>
