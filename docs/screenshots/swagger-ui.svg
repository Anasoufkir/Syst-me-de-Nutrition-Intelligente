<svg width="820" height="560" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Browser chrome -->
  <rect width="820" height="560" rx="10" fill="#f8f9fa"/>
  <rect width="820" height="42" rx="10" fill="#e9ecef"/>
  <rect y="32" width="820" height="10" fill="#e9ecef"/>
  <circle cx="20" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="21" r="6" fill="#febc2e"/>
  <circle cx="60" cy="21" r="6" fill="#28c840"/>
  <!-- Address bar -->
  <rect x="80" y="9" width="560" height="24" rx="12" fill="#ffffff"/>
  <text x="360" y="25" text-anchor="middle" fill="#495057" font-size="12">localhost:3000/api/docs</text>

  <!-- Swagger header -->
  <rect x="0" y="42" width="820" height="64" fill="#1b1b1b"/>
  <text x="30" y="72" fill="#ffffff" font-size="20" font-weight="bold">Swagger UI</text>
  <text x="30" y="92" fill="#89b4fa" font-size="13">Système de Nutrition Intelligente — API v1.0.0</text>
  <rect x="680" y="54" width="110" height="30" rx="4" fill="#89b4fa"/>
  <text x="735" y="74" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Authorize 🔒</text>

  <!-- Server selector -->
  <rect x="0" y="106" width="820" height="36" fill="#ffffff"/>
  <text x="20" y="129" fill="#3b4151" font-size="13" font-weight="bold">Servers</text>
  <rect x="90" y="113" width="300" height="22" rx="3" fill="#f7f7f7" stroke="#d9d9d9" stroke-width="1"/>
  <text x="100" y="129" fill="#3b4151" font-size="12">http://localhost:3000/api/v1  —  Développement</text>

  <!-- Tag: Nutrition -->
  <rect x="0" y="148" width="820" height="40" rx="0" fill="#e8f4fd" stroke="#c3dff0" stroke-width="1"/>
  <text x="20" y="173" fill="#3b4151" font-size="16" font-weight="bold">Nutrition</text>
  <text x="130" y="173" fill="#6c757d" font-size="13">Analyse et recommandations nutritionnelles</text>

  <!-- POST /nutrition/analyze -->
  <rect x="10" y="196" width="800" height="48" rx="4" fill="#e8f9f0" stroke="#28c840" stroke-width="1"/>
  <rect x="10" y="196" width="72" height="48" rx="4" fill="#28c840"/>
  <text x="46" y="226" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">POST</text>
  <text x="96" y="221" fill="#3b4151" font-size="14" font-weight="bold">/nutrition/analyze</text>
  <text x="96" y="236" fill="#6c757d" font-size="12">Analyse nutritionnelle complète (UC-01 à UC-08)</text>
  <text x="750" y="226" fill="#3b4151" font-size="18">›</text>

  <!-- POST /nutrition/validate -->
  <rect x="10" y="252" width="800" height="48" rx="4" fill="#e8f9f0" stroke="#28c840" stroke-width="1"/>
  <rect x="10" y="252" width="72" height="48" rx="4" fill="#28c840"/>
  <text x="46" y="282" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">POST</text>
  <text x="96" y="277" fill="#3b4151" font-size="14" font-weight="bold">/nutrition/validate</text>
  <text x="96" y="292" fill="#6c757d" font-size="12">Validation du profil utilisateur (UC-01)</text>
  <text x="750" y="282" fill="#3b4151" font-size="18">›</text>

  <!-- Tag: System -->
  <rect x="0" y="310" width="820" height="40" fill="#e8f4fd" stroke="#c3dff0" stroke-width="1"/>
  <text x="20" y="335" fill="#3b4151" font-size="16" font-weight="bold">System</text>
  <text x="100" y="335" fill="#6c757d" font-size="13">Endpoints système</text>

  <!-- GET /health — EXPANDED -->
  <rect x="10" y="358" width="800" height="48" rx="4" fill="#e8f0fe" stroke="#61affe" stroke-width="1"/>
  <rect x="10" y="358" width="72" height="48" rx="4" fill="#61affe"/>
  <text x="46" y="388" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">GET</text>
  <text x="96" y="383" fill="#3b4151" font-size="14" font-weight="bold">/health</text>
  <text x="96" y="398" fill="#6c757d" font-size="12">Health check — vérifie que l'API est opérationnelle</text>
  <text x="750" y="388" fill="#3b4151" font-size="18">∨</text>

  <!-- Expanded GET /health response -->
  <rect x="10" y="406" width="800" height="120" rx="0" fill="#fafafa" stroke="#dee2e6" stroke-width="1"/>
  <text x="26" y="428" fill="#6c757d" font-size="12" font-weight="bold">Responses</text>
  <rect x="26" y="436" width="32" height="20" rx="3" fill="#28c840"/>
  <text x="42" y="451" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">200</text>
  <text x="68" y="451" fill="#3b4151" font-size="12">API opérationnelle</text>
  <rect x="26" y="462" width="760" height="56" rx="4" fill="#f1f1f1"/>
  <text x="40" y="480" fill="#3b4151" font-size="12" font-family="monospace">{"status": "ok",  "version": "1.0.0",  "environment": "production"}</text>

  <!-- Schemas section -->
  <rect x="0" y="534" width="820" height="26" fill="#e9ecef"/>
  <text x="20" y="552" fill="#3b4151" font-size="13" font-weight="bold">Schemas</text>
  <text x="104" y="552" fill="#6c757d" font-size="13">UserProfileInput · NutritionAnalysisResponse · ValidationErrorResponse · ...</text>
</svg>
